<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar Examen - Docente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .rule-card {
            border-top: 4px solid #f1c40f;
        }

        .question-item {
            cursor: pointer;
            transition: 0.2s;
            border-left: 5px solid transparent;
        }

        .question-item:hover {
            background-color: #e9ecef;
        }

        .selected-q {
            border-left: 5px solid #2ecc71 !important;
            background-color: #f0fff4 !important;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 id="pageTitle"><i class="bi bi-file-earmark-medical me-2"></i>Configurar Nuevo Examen</h2>
            <a href="dashboard_profesor.html" class="btn btn-outline-secondary btn-sm">Cancelar</a>
        </div>

        <form id="examForm">
            <div class="row">
                <div class="col-lg-4">
                    <div class="card shadow-sm rule-card mb-4">
                        <div class="card-body">
                            <h5 class="card-title mb-3">Reglas de Aplicación</h5>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Materia del Examen</label>
                                <select id="materiaExamen" class="form-select" required
                                    onchange="filtrarPreguntasPorMateria()">
                                    <option value="">Selecciona una materia...</option>
                                    <option value="Matematicas">Matemáticas</option>
                                    <option value="Español">Español</option>
                                    <option value="Historia">Historia</option>
                                    <option value="Ciencias">Ciencias</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Título del Examen</label>
                                <input type="text" id="tituloExamen" class="form-control"
                                    placeholder="Ej. Primer Parcial" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Fecha de Disponibilidad</label>
                                <input type="datetime-local" id="fechaDisponibilidad" class="form-control" required>
                            </div>

                            <div class="row">
                                <div class="col-6 mb-3">
                                    <label class="form-label">Límite (Minutos)</label>
                                    <input type="number" id="limiteTiempo" class="form-control" value="60" required>
                                </div>
                                <div class="col-6 mb-3">
                                    <label class="form-label">Intentos</label>
                                    <input type="number" id="intentos" class="form-control" value="1" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Finalizar Examen</label>
                                <select id="retroal" class="form-select">
                                    <option value="inmediata">Inmediata al terminar</option>
                                    <option value="post_cierre">Después de fecha de cierre</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <button type="submit" id="btnSubmit" class="btn btn-success w-100 py-3 shadow">Publicar
                        Examen</button>
                </div>

                <div class="col-lg-8">
                    <div class="card shadow-sm">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">Selección de Preguntas del Banco</h5>
                            <span class="badge bg-primary" id="countSelected">0 Seleccionadas</span>
                        </div>
                        <div class="card-body">
                            <div id="bancoParaSeleccion" class="list-group">
                                <p class="text-center text-muted">Cargando reactivos...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        // CORRECCIÓN: Se agregó 'where' en la importación
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtg1t8wDvbGJggV4M6hWsBsg__kaoIAYE",
            authDomain: "databaseex-238c7.firebaseapp.com",
            projectId: "databaseex-238c7",
            storageBucket: "databaseex-238c7.firebasestorage.app",
            messagingSenderId: "1013480049532",
            appId: "1:1013480049532:web:066afa29f8727c7ea332f9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let preguntasSeleccionadas = [];
        const urlParams = new URLSearchParams(window.location.search);
        const examId = urlParams.get('edit');

        // 1. Verificar Autenticación
        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (examId) cargarDatosExamen();
                // Inicializar el banco vacío o con mensaje
                window.filtrarPreguntasPorMateria();
            } else {
                window.location.href = "login.html";
            }
        });

        // 2. Cargar datos si es EDICIÓN
        async function cargarDatosExamen() {
            try {
                const docRef = doc(db, "exams", examId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('materiaExamen').value = data.materia || "";
                    document.getElementById('tituloExamen').value = data.titulo || "";
                    document.getElementById('fechaDisponibilidad').value = data.fechaInicio || "";
                    document.getElementById('limiteTiempo').value = data.limiteMinutos || 60;
                    document.getElementById('intentos').value = data.intentosMaximos || 1;
                    document.getElementById('retroal').value = data.tipoRetro || "inmediata";

                    preguntasSeleccionadas = data.preguntasIDs || [];

                    // Actualizar UI de edición
                    document.getElementById('pageTitle').innerHTML = '<i class="bi bi-pencil-square me-2"></i>Editar Examen';
                    const btn = document.getElementById('btnSubmit');
                    btn.innerText = "Actualizar Examen";
                    btn.className = "btn btn-warning w-100 py-3 shadow";

                    // Cargar las preguntas de la materia del examen editado
                    window.filtrarPreguntasPorMateria();
                    actualizarContador();
                }
            } catch (error) {
                console.error("Error al cargar examen:", error);
            }
        }

        // 3. Función de Filtrado (Corregida)
        window.filtrarPreguntasPorMateria = () => {
            const materia = document.getElementById('materiaExamen').value;
            // CORRECCIÓN: Usar el ID correcto del HTML 'bancoParaSeleccion'
            const contenedor = document.getElementById('bancoParaSeleccion');

            if (!materia) {
                contenedor.innerHTML = '<p class="text-center text-muted">Selecciona una materia para ver las preguntas.</p>';
                return;
            }

            contenedor.innerHTML = '<p class="text-center text-muted">Filtrando preguntas...</p>';

            const q = query(
                collection(db, "questions"),
                where("categoria", "==", materia)
            );

            onSnapshot(q, (snapshot) => {
                contenedor.innerHTML = '';
                if (snapshot.empty) {
                    contenedor.innerHTML = '<p class="text-center text-warning">No hay preguntas cargadas para esta materia.</p>';
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    const isSelected = preguntasSeleccionadas.includes(id);

                    const item = document.createElement('div');
                    item.className = `list-group-item list-group-item-action question-item ${isSelected ? 'selected-q' : ''}`;
                    item.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center">
                        <span>${data.planteamiento}</span>
                        <span class="badge bg-info text-dark">${data.categoria}</span>
                    </div>
                `;

                    item.onclick = () => {
                        if (preguntasSeleccionadas.includes(id)) {
                            preguntasSeleccionadas = preguntasSeleccionadas.filter(i => i !== id);
                            item.classList.remove('selected-q');
                        } else {
                            preguntasSeleccionadas.push(id);
                            item.classList.add('selected-q');
                        }
                        actualizarContador();
                    };
                    contenedor.appendChild(item);
                });
            });
        };

        function actualizarContador() {
            document.getElementById('countSelected').innerText = `${preguntasSeleccionadas.length} Seleccionadas`;
        }

        // 4. Guardar o Actualizar
        document.getElementById('examForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (preguntasSeleccionadas.length === 0) {
                alert("Selecciona al menos una pregunta.");
                return;
            }

            const datosExamen = {
                materia: document.getElementById('materiaExamen').value,
                titulo: document.getElementById('tituloExamen').value,
                fechaInicio: document.getElementById('fechaDisponibilidad').value,
                limiteMinutos: document.getElementById('limiteTiempo').value,
                intentosMaximos: document.getElementById('intentos').value,
                tipoRetro: document.getElementById('retroal').value,
                preguntasIDs: preguntasSeleccionadas,
                ultimaModificacion: new Date().toISOString()
            };

            try {
                if (examId) {
                    await updateDoc(doc(db, "exams", examId), datosExamen);
                    alert("¡Examen actualizado!");
                } else {
                    datosExamen.fechaCreacion = new Date().toISOString();
                    datosExamen.creadoPor = auth.currentUser.uid;
                    await addDoc(collection(db, "exams"), datosExamen);
                    alert("¡Examen publicado!");
                }
                window.location.href = "dashboard_profesor.html";
            } catch (error) {
                console.error("Error al guardar:", error);
                alert("Error: " + error.message);
            }
        });
    </script>
</body>

</html>
