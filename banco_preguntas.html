<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Preguntas - Docente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .card-header {
            background-color: #2c3e50;
            color: white;
        }

        .form-section {
            border-left: 4px solid #3498db;
            padding-left: 15px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-database-fill-add me-2"></i>Banco de Preguntas</h2>
            <a href="dashboard_profesor.html" class="btn btn-outline-secondary btn-sm">Volver al Panel</a>
        </div>

        <div class="row">
            <div class="col-lg-5">
                <div class="card shadow-sm mb-4">
                    <div class="card-header">Nueva Pregunta</div>
                    <div class="card-body">
                        <form id="questionForm">
                            <div class="form-section">
                                <label class="form-label fw-bold">Planteamiento</label>
                                <textarea id="textoPregunta" class="form-control" rows="3"
                                    placeholder="Escribe la pregunta aquí..." required></textarea>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Materia</label>
                                    <select id="categoria" class="form-select" required
                                        onchange="filtrarPreguntasPorMateria()">
                                        <option value="">Seleccionar...</option>
                                        <option value="Matematicas">Matemáticas</option>
                                        <option value="Español">Español</option>
                                        <option value="Historia">Historia</option>
                                        <option value="Ciencias">Ciencias</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Dificultad</label>
                                    <select id="dificultad" class="form-select">
                                        <option value="Baja">Baja</option>
                                        <option value="Media">Media</option>
                                        <option value="Alta">Alta</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Tipo de Pregunta</label>
                                <select id="tipoPregunta" class="form-select" onchange="toggleOpciones()">
                                    <option value="opcion_multiple">Opción Múltiple</option>
                                    <option value="verdadero_falso">Verdadero/Falso</option>
                                    <option value="ensayo">Ensayo (Respuesta Abierta)</option>
                                </select>
                            </div>

                            <div id="sectionOpciones" class="mb-3 p-3 bg-light rounded border">
                                <label id="labelOpciones" class="form-label fw-bold text-primary">Opciones y Respuesta
                                    Correcta</label>

                                <div id="inputsOpciones">
                                    <input type="text" class="form-control mb-2 opt" placeholder="Opción A">
                                    <input type="text" class="form-control mb-2 opt" placeholder="Opción B">
                                    <input type="text" class="form-control mb-2 opt" placeholder="Opción C">
                                </div>

                                <div id="inputVerdaderoFalso" style="display: none;" class="py-2">
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="vfRespuesta" id="radioV"
                                            value="Verdadero">
                                        <label class="form-check-label" for="radioV">Verdadero</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="vfRespuesta" id="radioF"
                                            value="Falso">
                                        <label class="form-check-label" for="radioF">Falso</label>
                                    </div>
                                </div>

                                <label id="labelRespuesta" class="form-label small fw-bold mt-2">Respuesta
                                    Correcta</label>
                                <input type="text" id="respuestaCorrecta" class="form-control border-success"
                                    placeholder="Escribe la respuesta exacta">
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Guardar en el Banco</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="card shadow-sm">
                    <div class="card-header bg-secondary">Preguntas Existentes</div>
                    <div class="card-body">
                        <div id="listaPreguntas" class="list-group">
                            <p class="text-center text-muted">Cargando banco de reactivos...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, where, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let editId = null;

        // Reutiliza tu configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCtg1t8wDvbGJggV4M6hWsBsg__kaoIAYE",
            authDomain: "databaseex-238c7.firebaseapp.com",
            projectId: "databaseex-238c7",
            storageBucket: "databaseex-238c7.firebasestorage.app",
            messagingSenderId: "1013480049532",
            appId: "1:1013480049532:web:066afa29f8727c7ea332f9"
        };


        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);


        // Función para mostrar/ocultar opciones según el tipo
        window.toggleOpciones = () => {
            const tipo = document.getElementById('tipoPregunta').value;
            const section = document.getElementById('sectionOpciones');
            const inputsOpciones = document.getElementById('inputsOpciones');
            const inputVF = document.getElementById('inputVerdaderoFalso');
            const respuestaCorrecta = document.getElementById('respuestaCorrecta');
            const labelRespuesta = document.getElementById('labelRespuesta');

            // Reset general
            section.style.display = 'block';
            inputsOpciones.style.display = 'none';
            inputVF.style.display = 'none';
            respuestaCorrecta.style.display = 'block';
            labelRespuesta.style.display = 'block';

            if (tipo === 'ensayo') {
                section.style.display = 'none';
            } else if (tipo === 'verdadero_falso') {
                inputVF.style.display = 'block';
                respuestaCorrecta.style.display = 'none'; // Ocultamos el texto, usaremos el radio
                labelRespuesta.style.display = 'none';
            } else {
                inputsOpciones.style.display = 'block';
                document.querySelectorAll('.opt').forEach((i, index) => {
                    if (index < 2) i.required = true;
                });
            }
        };
        window.prepararEdicion = (id, dataJson) => {
            const data = JSON.parse(decodeURIComponent(dataJson));
            editId = id;
            document.getElementById('textoPregunta').value = data.planteamiento;
            document.getElementById('categoria').value = data.categoria;
            document.getElementById('dificultad').value = data.dificultad;
            document.getElementById('tipoPregunta').value = data.tipo;
            document.getElementById('respuestaCorrecta').value = data.respuestaCorrecta;

            toggleOpciones();

            if (data.tipo === 'opcion_multiple') {
                const opts = document.querySelectorAll('.opt');
                data.opciones.forEach((val, i) => { if (opts[i]) opts[i].value = val; });
            }

            document.querySelector('#questionForm button').innerText = "Actualizar Pregunta";
            document.querySelector('#questionForm button').className = "btn btn-warning w-100";
        };
        window.eliminarPregunta = async (id) => {
            if (confirm("¿Eliminar esta pregunta del banco?")) {
                await deleteDoc(doc(db, "questions", id));
            }
        };
        // Guardado corregido (Colección questions) [cite: 31]
        document.getElementById('questionForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const tipo = document.getElementById('tipoPregunta').value;
            let opciones = [];
            let respuestaFinal = "";

            if (tipo === 'opcion_multiple') {
                const optsElements = document.querySelectorAll('.opt');
                opciones = Array.from(optsElements).map(input => input.value).filter(v => v !== "");
                respuestaFinal = document.getElementById('respuestaCorrecta').value;
            } else if (tipo === 'verdadero_falso') {
                const radioSeleccionado = document.querySelector('input[name="vfRespuesta"]:checked');
                if (!radioSeleccionado) {
                    alert("Por favor selecciona si la respuesta es Verdadera o Falsa");
                    return;
                }
                respuestaFinal = radioSeleccionado.value;
                opciones = ["Verdadero", "Falso"];
            } else {
                respuestaFinal = "Pendiente de calificación (Ensayo)";
            }

            const objetoPregunta = {
                planteamiento: document.getElementById('textoPregunta').value,
                categoria: document.getElementById('categoria').value,
                dificultad: document.getElementById('dificultad').value,
                tipo: tipo,
                opciones: opciones,
                respuestaCorrecta: respuestaFinal, // Guardamos el valor del radio si es V/F
                fechaUltimaModificacion: new Date().toISOString()
            };

            try {
                if (editId) {
                    // LÓGICA DE EDICIÓN: Si editId tiene un valor, actualizamos el documento existente
                    const preguntaRef = doc(db, "questions", editId);
                    await updateDoc(preguntaRef, objetoPregunta);

                    alert("¡Pregunta actualizada exitosamente!");

                    // Restaurar el formulario al estado original
                    editId = null;
                    document.querySelector('#questionForm button').innerText = "Guardar en el Banco";
                    document.querySelector('#questionForm button').className = "btn btn-primary w-100";
                } else {
                    // LÓGICA DE NUEVA PREGUNTA: Si editId es nulo, creamos un documento nuevo[cite: 2]
                    objetoPregunta.fechaCreacion = new Date().toISOString();
                    objetoPregunta.aciertosHistoricos = 0;
                    await addDoc(collection(db, "questions"), objetoPregunta);

                    alert("¡Pregunta guardada exitosamente!");
                }

                document.getElementById('questionForm').reset();
                toggleOpciones();
                window.filtrarPreguntasPorMateria(); // Refresca la lista filtrada

            } catch (error) {
                console.error("Error al procesar la pregunta: ", error);
                alert("Error: " + error.message);
            }
        });


        let unsubscribeLista = null;

        window.filtrarPreguntasPorMateria = () => {
            const materiaSeleccionada = document.getElementById('categoria').value;
            const lista = document.getElementById('listaPreguntas');

            // Si hay un listener activo, lo cancelamos antes de crear uno nuevo
            if (unsubscribeLista) unsubscribeLista();

            if (!materiaSeleccionada) {
                lista.innerHTML = '<p class="text-center text-muted">Selecciona una materia para ver sus preguntas existentes.</p>';
                return;
            }

            lista.innerHTML = '<p class="text-center text-muted">Buscando reactivos de ' + materiaSeleccionada + '...</p>';

            // Consulta filtrada por la materia (Categoría)
            const q = query(
                collection(db, "questions"),
                where("categoria", "==", materiaSeleccionada)
            );

            // Activamos el listener en tiempo real para esa materia específica
            unsubscribeLista = onSnapshot(q, (snapshot) => {
                lista.innerHTML = '';

                if (snapshot.empty) {
                    lista.innerHTML = '<p class="text-center text-warning">No hay preguntas registradas para esta materia.</p>';
                    return;
                }

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const dataJson = encodeURIComponent(JSON.stringify(data));

                    lista.innerHTML += `
                <div class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="mb-1">${data.planteamiento}</h6>
                        <small class="text-muted">Tipo: ${data.tipo} | </small>
                        <span class="badge bg-info text-dark">${data.dificultad}</span>
                    </div>
                    <div class="btn-group shadow-sm">
                        <button class="btn btn-sm btn-outline-warning" onclick="prepararEdicion('${doc.id}', '${dataJson}')">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="eliminarPregunta('${doc.id}')">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>`;
                });
            });
        };
        window.filtrarPreguntasPorMateria();
    </script>
    

</body>

</html>
