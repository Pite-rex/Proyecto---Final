<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Preguntas - Docente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .card-header {
            background-color: #2c3e50;
            color: white;
        }

        .form-section {
            border-left: 4px solid #3498db;
            padding-left: 15px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-database-fill-add me-2"></i>Banco de Preguntas</h2>
            <a href="dashboard_profesor.html" class="btn btn-outline-secondary btn-sm">Volver al Panel</a>
        </div>

        <div class="row">
            <div class="col-lg-5">
                <div class="card shadow-sm mb-4">
                    <div class="card-header">Nueva Pregunta</div>
                    <div class="card-body">
                        <form id="questionForm">
                            <div class="form-section">
                                <label class="form-label fw-bold">Planteamiento</label>
                                <textarea id="textoPregunta" class="form-control" rows="3"
                                    placeholder="Escribe la pregunta aquí..." required></textarea>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Categoría (Tema)</label>
                                    <input type="text" id="categoria" class="form-control" placeholder="Ej. HTML5"
                                        required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Dificultad</label>
                                    <select id="dificultad" class="form-select">
                                        <option value="Baja">Baja</option>
                                        <option value="Media">Media</option>
                                        <option value="Alta">Alta</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Tipo de Pregunta</label>
                                <select id="tipoPregunta" class="form-select" onchange="toggleOpciones()">
                                    <option value="opcion_multiple">Opción Múltiple</option>
                                    <option value="verdadero_falso">Verdadero/Falso</option>
                                    <option value="ensayo">Ensayo (Respuesta Abierta)</option>
                                </select>
                            </div>

                            <div id="sectionOpciones" class="mb-3 p-3 bg-light rounded border">
                                <label id="labelOpciones" class="form-label fw-bold text-primary">Opciones y Respuesta
                                    Correcta</label>

                                <div id="inputsOpciones">
                                    <input type="text" class="form-control mb-2 opt" placeholder="Opción A" required>
                                    <input type="text" class="form-control mb-2 opt" placeholder="Opción B" required>
                                    <input type="text" class="form-control mb-2 opt" placeholder="Opción C">
                                </div>

                                <label class="form-label small fw-bold mt-2">Respuesta Correcta</label>
                                <input type="text" id="respuestaCorrecta" class="form-control border-success"
                                    placeholder="Escribe la respuesta exacta" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Guardar en el Banco</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="card shadow-sm">
                    <div class="card-header bg-secondary">Preguntas Existentes</div>
                    <div class="card-body">
                        <div id="listaPreguntas" class="list-group">
                            <p class="text-center text-muted">Cargando banco de reactivos...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let editId = null;

        // Reutiliza tu configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCtg1t8wDvbGJggV4M6hWsBsg__kaoIAYE",
            authDomain: "databaseex-238c7.firebaseapp.com",
            projectId: "databaseex-238c7",
            storageBucket: "databaseex-238c7.firebasestorage.app",
            messagingSenderId: "1013480049532",
            appId: "1:1013480049532:web:066afa29f8727c7ea332f9"
        };


        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);


        // Función para mostrar/ocultar opciones según el tipo
        window.toggleOpciones = () => {
            const tipo = document.getElementById('tipoPregunta').value;
            const section = document.getElementById('sectionOpciones');
            const inputsOpciones = document.getElementById('inputsOpciones');
            const respuestaCorrecta = document.getElementById('respuestaCorrecta');

            if (tipo === 'ensayo') {
                section.style.display = 'none';
                respuestaCorrecta.required = false;
                document.querySelectorAll('.opt').forEach(i => i.required = false);
            } else if (tipo === 'verdadero_falso') {
                section.style.display = 'block';
                inputsOpciones.style.display = 'none'; // Oculta A, B, C
                // Quitamos el 'required' de los inputs ocultos para que deje guardar
                document.querySelectorAll('.opt').forEach(i => i.required = false);
                respuestaCorrecta.placeholder = "Escribe 'Verdadero' o 'Falso'";
                respuestaCorrecta.required = true;
            } else {
                section.style.display = 'block';
                inputsOpciones.style.display = 'block'; // Muestra A, B, C
                document.querySelectorAll('.opt').forEach((i, index) => {
                    if (index < 2) i.required = true; // Solo A y B obligatorias
                });
                respuestaCorrecta.placeholder = "Texto de la respuesta correcta";
                respuestaCorrecta.required = true;
            }
        };
        window.prepararEdicion = (id, dataJson) => {
            const data = JSON.parse(decodeURIComponent(dataJson));
            editId = id;
            document.getElementById('textoPregunta').value = data.planteamiento;
            document.getElementById('categoria').value = data.categoria;
            document.getElementById('dificultad').value = data.dificultad;
            document.getElementById('tipoPregunta').value = data.tipo;
            document.getElementById('respuestaCorrecta').value = data.respuestaCorrecta;

            toggleOpciones();

            if (data.tipo === 'opcion_multiple') {
                const opts = document.querySelectorAll('.opt');
                data.opciones.forEach((val, i) => { if (opts[i]) opts[i].value = val; });
            }

            document.querySelector('#questionForm button').innerText = "Actualizar Pregunta";
            document.querySelector('#questionForm button').className = "btn btn-warning w-100";
        };
        window.eliminarPregunta = async (id) => {
            if (confirm("¿Eliminar esta pregunta del banco?")) {
                await deleteDoc(doc(db, "questions", id));
            }
        };
        // Guardado corregido (Colección questions) [cite: 31]
        document.getElementById('questionForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const tipo = document.getElementById('tipoPregunta').value;
            let opciones = [];

            // Extraer opciones si es opción múltiple
            if (tipo === 'opcion_multiple') {
                const optsElements = document.querySelectorAll('.opt');
                opciones = Array.from(optsElements).map(input => input.value).filter(v => v !== "");
            }

            // Estructura del objeto de la pregunta[cite: 2]
            const objetoPregunta = {
                planteamiento: document.getElementById('textoPregunta').value,
                categoria: document.getElementById('categoria').value,
                dificultad: document.getElementById('dificultad').value,
                tipo: tipo,
                opciones: opciones,
                respuestaCorrecta: document.getElementById('respuestaCorrecta').value,
                fechaUltimaModificacion: new Date().toISOString()
            };

            try {
                if (editId) {
                    // LÓGICA DE EDICIÓN: Si editId tiene un valor, actualizamos el documento existente
                    const preguntaRef = doc(db, "questions", editId);
                    await updateDoc(preguntaRef, objetoPregunta);

                    alert("¡Pregunta actualizada exitosamente!");

                    // Restaurar el formulario al estado original
                    editId = null;
                    document.querySelector('#questionForm button').innerText = "Guardar en el Banco";
                    document.querySelector('#questionForm button').className = "btn btn-primary w-100";
                } else {
                    // LÓGICA DE NUEVA PREGUNTA: Si editId es nulo, creamos un documento nuevo[cite: 2]
                    objetoPregunta.fechaCreacion = new Date().toISOString();
                    objetoPregunta.aciertosHistoricos = 0;
                    await addDoc(collection(db, "questions"), objetoPregunta);

                    alert("¡Pregunta guardada exitosamente!");
                }

                // Limpiar el formulario y resetear visualmente[cite: 2]
                document.getElementById('questionForm').reset();
                toggleOpciones();

            } catch (error) {
                console.error("Error al procesar la pregunta: ", error);
                alert("Error: " + error.message);
            }
        });

        // Leer preguntas en tiempo real
        const q = query(collection(db, "questions"), orderBy("fechaCreacion", "desc"));
        onSnapshot(q, (snapshot) => {
            const lista = document.getElementById('listaPreguntas');
            lista.innerHTML = '';

            snapshot.forEach((doc) => {
                const data = doc.data();
                // Convertimos los datos a un string seguro para pasarlo por la función de edición
                const dataJson = encodeURIComponent(JSON.stringify(data));

                lista.innerHTML += `
        <div class="list-group-item d-flex justify-content-between align-items-center">
            <div>
                <div class="d-flex w-100 justify-content-between">
                    <h6 class="mb-1">${data.planteamiento}</h6>
                </div>
                <small class="text-muted">Tema: ${data.categoria} | Tipo: ${data.tipo} | </small>
                <span class="badge bg-info text-dark">${data.dificultad}</span>
            </div>
            
            <!-- SECCIÓN DE BOTONES NUEVA -->
            <div class="btn-group shadow-sm">
                <button class="btn btn-sm btn-outline-warning" onclick="prepararEdicion('${doc.id}', '${dataJson}')" title="Editar">
                    <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger" onclick="eliminarPregunta('${doc.id}')" title="Eliminar">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
        </div>`;
            });
        });
    </script>

</body>

</html>
