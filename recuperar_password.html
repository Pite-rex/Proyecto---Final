<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña - ExamSys</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 card shadow p-4 border-0" style="border-radius: 15px;">
                <h3 class="text-center fw-bold">Recuperar Acceso</h3>
                <p class="text-muted small text-center">Enviaremos un enlace a tu correo institucional.</p>
                <form id="recoveryForm">
                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" id="emailRecovery" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Enviar enlace</button>
                    <div class="text-center mt-3">
                        <a href="login.html" class="small text-decoration-none text-secondary">Volver al login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtg1t8wDvbGJggV4M6hWsBsg__kaoIAYE",
            authDomain: "databaseex-238c7.firebaseapp.com",
            projectId: "databaseex-238c7",
            storageBucket: "databaseex-238c7.firebasestorage.app",
            messagingSenderId: "1013480049532",
            appId: "1:1013480049532:web:066afa29f8727c7ea332f9"
        };
        const auth = getAuth(initializeApp(firebaseConfig));

        document.getElementById('recoveryForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('emailRecovery').value;
            sendPasswordResetEmail(auth, email)
                .then(() => alert("Correo de recuperación enviado."))
                .catch((error) => alert("Error: " + error.message));
        });
    </script>
</body>

</html>
