<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - ExamSys ISC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #f4f7f6; min-height: 100vh; display: flex; align-items: center; padding: 20px 0; }
        .recovery-card { max-width: 500px; width: 100%; border: none; border-radius: 15px; }
        .btn-primary { background-color: #2c3e50; border: none; }
        .btn-primary:hover { background-color: #34495e; }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="card recovery-card shadow-lg p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-key h1 text-primary"></i>
                    <h2 class="fw-bold">Recuperar Contraseña</h2>
                    <p class="text-muted small">Ingresa tu correo para recibir instrucciones</p>
                </div>

                <form id="recoveryForm">
                    <div class="mb-3">
                        <label class="form-label">Correo Institucional</label>
                        <input type="email" id="email" class="form-control" placeholder="usuario@tecnm.mx" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Enviar Enlace de Recuperación</button>

                    <div class="text-center">
                        <span class="small text-muted">¿Recordaste tu contraseña? <a href="index.html" class="text-decoration-none">Inicia sesión</a></span>
                    </div>
                </form>

                <div id="successMessage" class="alert alert-success d-none mt-3" role="alert">
                    <i class="bi bi-check-circle me-2"></i>
                    Se envió un enlace de recuperación a tu correo.
                </div>

                <div id="errorMessage" class="alert alert-danger d-none mt-3" role="alert"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtg1t8wDvbGJggV4M6hWsBsg__kaoIAYE",
            authDomain: "databaseex-238c7.firebaseapp.com",
            projectId: "databaseex-238c7",
            storageBucket: "databaseex-238c7.firebasestorage.app",
            messagingSenderId: "1013480049532",
            appId: "1:1013480049532:web:066afa29f8727c7ea332f9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const recoveryForm = document.getElementById('recoveryForm');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');

        recoveryForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            
            // Validar que el email no esté vacío
            if (!email) {
                showError('Por favor, ingresa un correo electrónico válido.');
                return;
            }

            try {
                // Validar que el usuario existe en Firestore
                const userQuery = await getDoc(doc(db, "users", email));
                
                if (!userQuery.exists()) {
                    showError('Este correo no está registrado en el sistema.');
                    return;
                }

                // Enviar email de recuperación mediante Firebase Auth
                await sendPasswordResetEmail(auth, email);
                
                // Mostrar mensaje de éxito
                showSuccess();
                recoveryForm.reset();
                
            } catch (error) {
                console.error('Error:', error);
                
                if (error.code === 'auth/user-not-found') {
                    showError('Este correo no existe en el sistema.');
                } else if (error.code === 'auth/invalid-email') {
                    showError('El formato del correo no es válido.');
                } else {
                    showError('Error al procesar la solicitud: ' + error.message);
                }
            }
        });

        function showSuccess() {
            successMessage.classList.remove('d-none');
            errorMessage.classList.add('d-none');
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.remove('d-none');
            successMessage.classList.add('d-none');
        }
    </script>

</body>
</html>
