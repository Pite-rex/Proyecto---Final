<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calificar Ensayos - Docente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark shadow-sm p-3">
        <div class="container">
            <span class="navbar-brand fw-bold">Revisión de Preguntas Abiertas</span>
            <a href="dashboard_profesor.html" class="btn btn-outline-light btn-sm">Volver al Panel</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3>Evaluaciones Pendientes de Calificar</h3>
            <span class="badge bg-primary" id="contadorPendientes">0 Pendientes</span>
        </div>

        <div id="listaPendientes">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Buscando ensayos por revisar...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtg1t8wDvbGJggV4M6hWsBsg__kaoIAYE",
            authDomain: "databaseex-238c7.firebaseapp.com",
            projectId: "databaseex-238c7",
            storageBucket: "databaseex-238c7.firebasestorage.app",
            messagingSenderId: "1013480049532",
            appId: "1:1013480049532:web:066afa29f8727c7ea332f9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "index.html";
            else cargarEnsayosPendientes();
        });

        function cargarEnsayosPendientes() {
            // Filtramos resultados finalizados que requieren revisión manual
            const q = query(
                collection(db, "results"),
                where("estado", "==", "finalizado"),
                where("requiereRevision", "==", true)
            );

            onSnapshot(q, async (snapshot) => {
                const contenedor = document.getElementById('listaPendientes');
                document.getElementById('contadorPendientes').innerText = `${snapshot.size} Pendientes`;

                if (snapshot.empty) {
                    contenedor.innerHTML = `
                        <div class="alert alert-success text-center shadow-sm">
                            <i class="bi bi-check-circle me-2"></i> No hay preguntas abiertas pendientes de calificación.
                        </div>`;
                    return;
                }

                contenedor.innerHTML = '';

                for (const docRes of snapshot.docs) {
                    const resData = docRes.data();
                    const resId = docRes.id;

                    // 1. Obtener nombre del alumno
                    let nombreAlumno = "Estudiante";
                    const userSnap = await getDoc(doc(db, "users", resData.ID_estudiante));
                    if (userSnap.exists()) nombreAlumno = userSnap.data().nombre;

                    // 2. Identificar las preguntas de tipo ensayo dentro de las respuestas
                    const respuestasUser = resData.respuestas || {};

                    for (const pID in respuestasUser) {
                        const qSnap = await getDoc(doc(db, "questions", pID));
                        if (qSnap.exists() && qSnap.data().tipo === 'ensayo') {
                            const qData = qSnap.data();

                            const card = document.createElement('div');
                            card.className = 'card mb-4 shadow-sm border-0';
                            card.innerHTML = `
                                <div class="card-body">
                                    <div class="d-flex justify-content-between">
                                        <h6 class="text-primary fw-bold">
                                            <i class="bi bi-person-fill me-1"></i> Alumno: ${nombreAlumno} 
                                            <span class="text-muted mx-2">|</span> 
                                            <i class="bi bi-file-earmark-text me-1"></i> Examen: ${resData.materia || 'General'}
                                        </h6>
                                        <span class="badge bg-warning text-dark">Pendiente</span>
                                    </div>
                                    <hr>
                                    <p class="mb-1"><strong>Pregunta:</strong> ${qData.planteamiento}</p>
                                    <div class="bg-white p-3 border rounded mb-3">
                                        <p class="mb-0 text-dark"><em>"${respuestasUser[pID]}"</em></p>
                                    </div>
                                    
                                    <div class="row g-3 align-items-end">
                                        <div class="col-md-2">
                                            <label class="form-label small fw-bold">Calificación (0-10)</label>
                                            <input type="number" id="nota-${resId}-${pID}" class="form-control" min="0" max="10" step="0.1" placeholder="Ej: 8.5">
                                        </div>
                                        <div class="col-md-7">
                                            <label class="form-label small fw-bold">Retroalimentación para el alumno</label>
                                            <input type="text" id="feedback-${resId}-${pID}" class="form-control" placeholder="Buen análisis, faltó mencionar...">
                                        </div>
                                        <div class="col-md-3">
                                            <button class="btn btn-success w-100 shadow-sm" onclick="guardarCalificacion('${resId}', '${pID}')">
                                                <i class="bi bi-save me-2"></i>Confirmar Nota
                                            </button>
                                        </div>
                                    </div>
                                </div>`;
                            contenedor.appendChild(card);
                        }
                    }
                }
            });
        }

        window.guardarCalificacion = async (resId, pID) => {
            const nota = document.getElementById(`nota-${resId}-${pID}`).value;
            const feedback = document.getElementById(`feedback-${resId}-${pID}`).value;

            if (!nota || nota < 0 || nota > 10) {
                alert("Por favor ingresa una nota válida entre 0 y 10.");
                return;
            }

            try {
                const resRef = doc(db, "results", resId);
                const resSnap = await getDoc(resRef);
                const data = resSnap.data();

                // Recalcular la nota final sumando esta revisión
                // (Nota: En un sistema real, sumarías aciertos automáticos + esta nota manual)
                // Aquí simplificamos actualizando el estado de revisión
                await updateDoc(resRef, {
                    calificacionFinal: nota, // Se guarda la nota asignada
                    comentariosDocente: feedback,
                    requiereRevision: false, // Ya no aparecerá en esta lista
                    revisadoPor: auth.currentUser.uid,
                    fechaRevision: new Date().toISOString()
                });

                alert("¡Calificación guardada y enviada al alumno!");
            } catch (error) {
                console.error("Error al calificar:", error);
                alert("Error técnico: " + error.message);
            }
        };
    </script>
</body>

</html>
