<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Exámenes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: #f4f7f6;
            height: 100vh;
            display: flex;
            align-items: center;
        }

        .login-card {
            max-width: 400px;
            width: 100%;
            border: none;
            border-radius: 15px;
        }

        .btn-primary {
            background-color: #2c3e50;
            border: none;
        }

        .btn-primary:hover {
            background-color: #34495e;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="card login-card shadow-lg p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-person-circle h1 text-secondary"></i>
                    <h2 class="fw-bold">Bienvenido</h2>
                    <p class="text-muted">Ingresa a tu cuenta de ExamSys</p>
                </div>

                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" id="email" class="form-control" placeholder="usuario@tecnm.mx" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <div class="d-flex justify-content-between mb-3 small">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label" for="remember">Recordarme</label>
                        </div>
                        <a href="recuperar_password.html" class="text-decoration-none">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Iniciar Sesión</button>

                    <div class="text-center">
                        <span class="small text-muted">¿No tienes cuenta? <a href="registro.html"
                                class="text-decoration-none">Regístrate aquí</a></span>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        // 1. Importaciones actualizadas (incluyendo Firestore para roles)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        // Agregamos getFirestore, doc y getDoc para leer la colección 'users'
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtg1t8wDvbGJggV4M6hWsBsg__kaoIAYE",
            authDomain: "databaseex-238c7.firebaseapp.com",
            projectId: "databaseex-238c7",
            storageBucket: "databaseex-238c7.firebasestorage.app",
            messagingSenderId: "1013480049532",
            appId: "1:1013480049532:web:066afa29f8727c7ea332f9"
        };

        // 2. Inicialización de servicios
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app); // Inicializamos la base de datos

        // 3. Lógica de Inicio de Sesión y Redirección por Rol
        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Autenticación segura (Módulo 1)
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Obtener el documento del usuario desde la colección 'users' 
                const userDocRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userDocRef);

                if (userSnap.exists()) {
                    const userData = userSnap.data();
                    const rol = userData.rol; // El campo 'rol' que guardaste al registrarte 

                    // Redirección según el perfil (Módulo 1) 
                    if (rol === "Administrador") {
                        window.location.href = "dashboard_admin.html";
                    } else if (rol === "Docente") {
                        window.location.href = "dashboard_profesor.html";
                    } else {
                        window.location.href = "dashboard_estudiante.html";
                    }
                } else {
                    alert("No se encontró información de perfil en la base de datos.");
                }
            } catch (error) {
                // Manejo de errores de credenciales [cite: 36]
                alert("Error al iniciar sesión: " + error.message);
            }
        });
    </script>

</body>

</html>
