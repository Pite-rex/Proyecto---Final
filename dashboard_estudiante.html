<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Estudiante - ExamSys</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode.js/1.5.3/qrcode.min.js"></script>
    
    <style>
        :root {
            --student-blue: #34495e;
            --accent-green: #27ae60;
        }

        body {
            background-color: #f4f7f6;
        }

        .navbar {
            background-color: var(--student-blue);
        }

        .exam-card {
            border: none;
            border-radius: 12px;
            transition: 0.3s;
        }

        .exam-card:hover {
            transform: scale(1.02);
        }

        .welcome-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }

        /* ESTILOS PARA LA TARJETA DE PERFIL CON QR */
        .profile-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .profile-header {
            margin-bottom: 20px;
        }

        .profile-header i {
            font-size: 48px;
            color: var(--student-blue);
            margin-bottom: 10px;
        }

        .profile-header h6 {
            color: var(--student-blue);
            font-weight: 700;
        }

        #qrCode {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        #qrCode canvas {
            border: 3px solid var(--student-blue);
            border-radius: 8px;
            padding: 10px;
            background: white;
        }

        .profile-info {
            text-align: left;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 13px;
        }

        .profile-info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #dee2e6;
        }

        .profile-info-item:last-child {
            border-bottom: none;
        }

        .profile-info-label {
            font-weight: 600;
            color: var(--student-blue);
        }

        .profile-info-value {
            word-break: break-all;
            color: #555;
            text-align: right;
            max-width: 60%;
        }

        .btn-download-qr {
            margin-top: 15px;
            width: 100%;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-dark shadow-sm p-3">
        <div class="container d-flex justify-content-between">
            <span class="navbar-brand fw-bold"><i class="bi bi-mortarboard me-2"></i>Portal del Estudiante</span>
            <button id="btnLogout" class="btn btn-outline-light btn-sm">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="container py-5">
        <div class="welcome-section shadow-sm border-0">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h2 class="fw-bold mb-1">¡Hola, Estudiante!</h2>
                    <p class="text-muted">Aquí puedes ver tus exámenes programados y tus notas finales.</p>
                </div>
                <div class="col-md-4 text-md-end">
                    <span class="badge bg-light text-dark p-2 border">ID: <span
                            id="userIdDisplay">Cargando...</span></span>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <h5 class="fw-bold mb-4 text-uppercase small text-muted">Evaluaciones Pendientes</h5>
                <div id="listaExamenesDisponibles" class="row g-3">
                </div>
            </div>

            <div class="col-lg-4">
                <!-- TARJETA DE PERFIL CON QR -->
                <div class="profile-card">
                    <div class="profile-header">
                        <i class="bi bi-person-circle"></i>
                        <h6 class="mb-0">Mi Perfil</h6>
                    </div>

                    <!-- QR Code generado dinámicamente -->
                    <div id="qrCode"></div>

                    <!-- Información del estudiante -->
                    <div class="profile-info">
                        <div class="profile-info-item">
                            <span class="profile-info-label">📧 Email:</span>
                            <span class="profile-info-value" id="profileEmail">Cargando...</span>
                        </div>
                        <div class="profile-info-item">
                            <span class="profile-info-label">🔑 UID:</span>
                            <span class="profile-info-value" id="profileUID" style="font-size: 11px;">Cargando...</span>
                        </div>
                    </div>

                    <!-- Botón para descargar QR -->
                    <button id="btnDescargarQR" class="btn btn-primary btn-download-qr btn-sm">
                        <i class="bi bi-download me-2"></i>Descargar QR
                    </button>
                </div>

                <!-- SECCIÓN DE CALIFICACIONES -->
                <h5 class="fw-bold mb-4 text-uppercase small text-muted">Tus Calificaciones</h5>
                <div id="listaResultados" class="list-group shadow-sm">
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCtg1t8wDvbGJggV4M6hWsBsg__kaoIAYE",
            authDomain: "databaseex-238c7.firebaseapp.com",
            projectId: "databaseex-238c7",
            storageBucket: "databaseex-238c7.firebasestorage.app",
            messagingSenderId: "1013480049532",
            appId: "1:1013480049532:web:066afa29f8727c7ea332f9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "index.html";
    } else {
        currentUser = user;
        document.getElementById('userIdDisplay').innerText = user.email;
        document.getElementById('profileEmail').innerText = user.email;
        document.getElementById('profileUID').innerText = user.uid.substring(0, 25) + '...';

        // Generar QR con datos del estudiante
        generarQR(user);

        // AQUÍ PASA EL user A cargarExamenes
        cargarExamenes(user); 
        cargarResultados(user.uid);
    }
});

        // Función para generar QR con datos del perfil
        function generarQR(user) {
            const qrData = {
                email: user.email,
                uid: user.uid,
                fecha: new Date().toLocaleDateString('es-ES')
            };

            // Limpiar QR anterior
            const qrElement = document.getElementById('qrCode');
            qrElement.innerHTML = '';

            // Generar nuevo QR
            new QRCode(qrElement, {
                text: JSON.stringify(qrData),
                width: 200,
                height: 200,
                colorDark: "#34495e",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        // Descargar QR
        document.getElementById('btnDescargarQR').addEventListener('click', function () {
            if (currentUser) {
                const canvas = document.querySelector('#qrCode canvas');
                if (canvas) {
                    const link = document.createElement('a');
                    link.href = canvas.toDataURL('image/png');
                    link.download = `QR_Perfil_${currentUser.email.split('@')[0]}.png`;
                    link.click();
                }
            }
        });

        // Cargar exámenes publicados
        async function cargarExamenes(user) {
            const qResultados = query(collection(db, "results"), where("ID_estudiante", "==", user.uid));
            const querySnapshotResultados = await getDocs(qResultados);
            const examenesCompletados = [];
            querySnapshotResultados.forEach((doc) => {
                examenesCompletados.push(doc.data().ID_examen);
            });

            onSnapshot(collection(db, "exams"), (snapshot) => {
                const container = document.getElementById('listaExamenesDisponibles');
                container.innerHTML = '';

                let hayExamenes = false;

                snapshot.forEach((doc) => {
                    const examID = doc.id;
                    const examen = doc.data();

                    if (!examenesCompletados.includes(examID)) {
                        hayExamenes = true;
                        container.innerHTML += `
                    <div class="col-md-6">
                        <div class="card exam-card shadow-sm p-4 bg-white h-100">
                            <h6 class="fw-bold text-primary">${examen.titulo}</h6>
                            <p class="small text-muted mb-3"><i class="bi bi-clock me-1"></i> Duración: ${examen.limiteMinutos} min</p>
                            <a href="ejecucion_examen.html?id=${examID}" class="btn btn-primary w-100 mt-auto">Comenzar</a>
                        </div>
                    </div>
                `;
                    }
                });

                if (!hayExamenes) {
                    container.innerHTML = '<div class="alert alert-info w-100">No tienes exámenes pendientes por ahora.</div>';
                }
            });
        }

        // Cargar calificaciones
        function cargarResultados(uid) {
            const q = query(collection(db, "results"), where("ID_estudiante", "==", uid));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('listaResultados');
                list.innerHTML = '';
                if (snapshot.empty) list.innerHTML = '<div class="list-group-item small text-muted">Aún no tienes exámenes finalizados.</div>';
                snapshot.forEach((doc) => {
                    const res = doc.data();
                    list.innerHTML += `
                        <a href="revision_resultados.html?id=${doc.id}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                            <span>Examen Finalizado</span>
                            <span class="badge bg-success rounded-pill">${res.calificacionFinal || 'Pendiente'}</span>
                        </a>
                    `;
                });
            });
        }

        document.getElementById('btnLogout').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = "index.html");
        });
    </script>
</body>

</html>
