<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Estudiante - ExamSys</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --student-blue: #34495e;
            --accent-green: #27ae60;
        }

        body {
            background-color: #f4f7f6;
        }

        .navbar {
            background-color: var(--student-blue);
        }

        .exam-card {
            border: none;
            border-radius: 12px;
            transition: 0.3s;
        }

        .exam-card:hover {
            transform: scale(1.02);
        }

        .welcome-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-dark shadow-sm p-3">
        <div class="container d-flex justify-content-between">
            <span class="navbar-brand fw-bold"><i class="bi bi-mortarboard me-2"></i>Portal del Estudiante</span>
            <button id="btnLogout" class="btn btn-outline-light btn-sm">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="container py-5">
        <div class="welcome-section shadow-sm border-0">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h2 class="fw-bold mb-1">¡Hola, Estudiante!</h2>
                    <p class="text-muted">Aquí puedes ver tus exámenes programados y tus notas finales.</p>
                </div>
                <div class="col-md-4 text-md-end">
                    <span class="badge bg-light text-dark p-2 border">ID: <span
                            id="userIdDisplay">Cargando...</span></span>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <h5 class="fw-bold mb-4 text-uppercase small text-muted">Evaluaciones Pendientes</h5>
                <div id="listaExamenesDisponibles" class="row g-3">
                </div>
            </div>

            <div class="col-lg-4">
                <h5 class="fw-bold mb-4 text-uppercase small text-muted">Tus Calificaciones</h5>
                <div id="listaResultados" class="list-group shadow-sm">
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyCtg1t8wDvbGJggV4M6hWsBsg__kaoIAYE",
            authDomain: "databaseex-238c7.firebaseapp.com",
            projectId: "databaseex-238c7",
            storageBucket: "databaseex-238c7.firebasestorage.app",
            messagingSenderId: "1013480049532",
            appId: "1:1013480049532:web:066afa29f8727c7ea332f9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        
        onAuthStateChanged(auth, async (user) => {
            // 1. Si no hay sesión iniciada
            if (!user) {
                window.location.href = "index.html";
                return;
            }

            // 2. EL GUARDIA ESTRICTO: Bloqueo de URL pegada (Referrer check)
            if (document.referrer === "") {
                alert("Acceso denegado. Por seguridad, debes iniciar sesión desde la página principal.");
                window.location.href = "index.html";
                return;
            }

            // 3. Verificar Rol en Firestore
            try {
                const userSnap = await getDoc(doc(db, "users", user.uid));
                
                if (userSnap.exists() && userSnap.data().rol === "Estudiante") {
                    // 4. Si es seguro y es estudiante, inicializar la página
                    document.getElementById('userIdDisplay').innerText = user.email;
                    cargarDashboardCompleto(user);
                } else {
                    alert("Acceso denegado. No tienes permisos de Estudiante para acceder aquí.");
                    window.location.href = "index.html";
                }
            } catch (error) {
                console.error("Error validando el rol:", error);
                window.location.href = "index.html";
            }
        });

        async function cargarDashboardCompleto(user) {
            // Escuchamos los resultados del alumno en tiempo real
            const qResultados = query(collection(db, "results"), where("ID_estudiante", "==", user.uid));

            onSnapshot(qResultados, (snapshotResultados) => {
                const examenesCompletados = [];
                const listResultados = document.getElementById('listaResultados');
                listResultados.innerHTML = '';

                // 1. Procesar resultados actuales
                if (snapshotResultados.empty) {
                    listResultados.innerHTML = '<div class="list-group-item small text-muted">Aún no tienes exámenes finalizados.</div>';
                }

                snapshotResultados.forEach((docRes) => {
                    const res = docRes.data();
                    // Guardamos el ID del examen para filtrarlo de la lista de pendientes
                    examenesCompletados.push(res.ID_examen);

                    listResultados.innerHTML += `
                    <a href="revision_resultados.html?id=${docRes.id}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                        <div>
                            <span class="d-block fw-bold">${res.materia || 'Examen'}</span>
                            <small class="text-muted">Finalizado el: ${new Date(res.fechaTermino).toLocaleDateString()}</small>
                        </div>
                        <span class="badge ${res.calificacionFinal !== null ? 'bg-success' : 'bg-warning'} rounded-pill">
                            ${res.calificacionFinal !== null ? res.calificacionFinal : 'Pendiente'}
                        </span>
                    </a>
                `;
                });

                // 2. Cargar/Actualizar exámenes pendientes basados en lo que NO ha completado
                cargarExamenesPendientes(examenesCompletados);
            });
        }

        function cargarExamenesPendientes(completados) {
            onSnapshot(collection(db, "exams"), (snapshotExams) => {
                const container = document.getElementById('listaExamenesDisponibles');
                container.innerHTML = '';
                let hayExamenes = false;

                snapshotExams.forEach((docExam) => {
                    const examID = docExam.id;
                    const examen = docExam.data();

                    // FILTRO: Solo mostrar si no está en la lista de completados
                    if (!completados.includes(examID)) {
                        hayExamenes = true;
                        container.innerHTML += `
                        <div class="col-md-6">
                            <div class="card exam-card shadow-sm p-4 bg-white h-100">
                                <div class="badge bg-info mb-2 align-self-start">${examen.materia || 'General'}</div>
                                <h5 class="fw-bold text-dark">${examen.titulo}</h5>
                                <p class="small text-muted mb-3">
                                    <i class="bi bi-clock me-1"></i> Tiempo: ${examen.limiteMinutos} min <br>
                                    <i class="bi bi-arrow-repeat me-1"></i> Intentos: ${examen.intentosMaximos || 1}
                                </p>
                                <a href="ejecucion_examen.html?id=${examID}" class="btn btn-primary w-100 mt-auto shadow-sm">
                                    Comenzar Evaluación
                                </a>
                            </div>
                        </div>
                    `;
                    }
                });

                if (!hayExamenes) {
                    container.innerHTML = `
                    <div class="text-center py-5 w-100">
                        <i class="bi bi-check-circle text-success display-4"></i>
                        <p class="text-muted mt-2">No tienes evaluaciones pendientes por el momento.</p>
                    </div>`;
                }
            });
        }

        document.getElementById('btnLogout').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = "index.html");
        });
    </script>
</body>

</html>
