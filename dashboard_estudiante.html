<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Estudiante - ExamSys</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --student-blue: #34495e;
            --accent-green: #27ae60;
        }

        body {
            background-color: #f4f7f6;
        }

        .navbar {
            background-color: var(--student-blue);
        }

        .exam-card {
            border: none;
            border-radius: 12px;
            transition: 0.3s;
        }

        .exam-card:hover {
            transform: scale(1.02);
        }

        .welcome-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .profile-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .profile-header i {
            font-size: 40px;
            color: var(--student-blue);
        }

        .profile-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            font-size: 13px;
        }

        .profile-info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #dee2e6;
        }

        .profile-info-item:last-child {
            border-bottom: none;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-dark shadow-sm p-3">
        <div class="container d-flex justify-content-between">
            <span class="navbar-brand fw-bold"><i class="bi bi-mortarboard me-2"></i>Portal del Estudiante</span>
            <button id="btnLogout" class="btn btn-outline-light btn-sm">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="container py-5">
        <div class="welcome-section shadow-sm border-0">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h2 class="fw-bold mb-1">¡Hola, Estudiante!</h2>
                    <p class="text-muted">Gestiona tus evaluaciones y revisa tus resultados aquí.</p>
                </div>
                <div class="col-md-4 text-md-end">
                    <span class="badge bg-light text-dark p-2 border">Sesión activa</span>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <h5 class="fw-bold mb-4 text-uppercase small text-muted">Evaluaciones Pendientes</h5>
                <div id="listaExamenesDisponibles" class="row g-3">
                    <div class="text-center p-5">Cargando exámenes...</div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="profile-card">
                    <div class="d-flex align-items-center mb-3">
                        <i class="bi bi-person-circle me-3"></i>
                        <h6 class="mb-0 fw-bold">Mi Información</h6>
                    </div>

                    <div class="profile-info">
                        <div class="profile-info-item">
                            <span class="fw-bold text-muted">Email:</span>
                            <span id="profileEmail">...</span>
                        </div>
                        <div class="profile-info-item">
                            <span class="fw-bold text-muted">ID Usuario:</span>
                            <span id="profileUID" style="font-size: 11px;">...</span>
                        </div>
                    </div>
                </div>

                <h5 class="fw-bold mb-4 text-uppercase small text-muted">Tus Calificaciones</h5>
                <div id="listaResultados" class="list-group shadow-sm">
                    </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtg1t8wDvbGJggV4M6hWsBsg__kaoIAYE",
            authDomain: "databaseex-238c7.firebaseapp.com",
            projectId: "databaseex-238c7",
            storageBucket: "databaseex-238c7.firebasestorage.app",
            messagingSenderId: "1013480049532",
            appId: "1:1013480049532:web:066afa29f8727c7ea332f9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "index.html";
            } else {
                document.getElementById('profileEmail').innerText = user.email;
                document.getElementById('profileUID').innerText = user.uid;

                cargarExamenes(user);
                cargarResultados(user.uid);
            }
        });

        async function cargarExamenes(user) {
            try {
                // 1. Obtener estados de los exámenes del usuario
                const qResultados = query(collection(db, "results"), where("ID_estudiante", "==", user.uid));
                const querySnapshotResultados = await getDocs(qResultados);
                
                const completados = [];
                const enProgreso = [];

                querySnapshotResultados.forEach((doc) => {
                    const data = doc.data();
                    if (data.estado === "finalizado") completados.push(data.ID_examen);
                    else if (data.estado === "en_progreso") enProgreso.push(data.ID_examen);
                });

                // 2. Escuchar cambios en la colección de exámenes
                onSnapshot(collection(db, "exams"), (snapshot) => {
                    const container = document.getElementById('listaExamenesDisponibles');
                    container.innerHTML = '';
                    let hayExamenes = false;

                    snapshot.forEach((doc) => {
                        const examID = doc.id;
                        const examen = doc.data();

                        // Mostrar solo si no está finalizado
                        if (!completados.includes(examID)) {
                            hayExamenes = true;
                            const esProceso = enProgreso.includes(examID);
                            
                            container.innerHTML += `
                                <div class="col-md-6">
                                    <div class="card exam-card shadow-sm p-4 bg-white h-100 border-start border-4 ${esProceso ? 'border-warning' : 'border-primary'}">
                                        <h6 class="fw-bold text-primary">${examen.titulo || 'Examen'}</h6>
                                        <p class="small text-muted mb-3"><i class="bi bi-clock me-1"></i> Duración: ${examen.limiteMinutos || 0} min</p>
                                        <a href="ejecucion_examen.html?id=${examID}" class="btn ${esProceso ? 'btn-warning' : 'btn-primary'} w-100 mt-auto">
                                            ${esProceso ? 'Continuar Examen' : 'Comenzar'}
                                        </a>
                                    </div>
                                </div>`;
                        }
                    });

                    if (!hayExamenes) {
                        container.innerHTML = '<div class="alert alert-info w-100 text-center">No tienes exámenes pendientes por ahora.</div>';
                    }
                });
            } catch (error) {
                console.error("Error en Firestore:", error);
            }
        }

        function cargarResultados(uid) {
            const q = query(collection(db, "results"), where("ID_estudiante", "==", uid));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('listaResultados');
                list.innerHTML = '';
                let hayFinalizados = false;

                snapshot.forEach((doc) => {
                    const res = doc.data();
                    if (res.estado === "finalizado") {
                        hayFinalizados = true;
                        list.innerHTML += `
                            <a href="revision_resultados.html?id=${doc.id}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                                <span>${res.nombreExamen || 'Examen Finalizado'}</span>
                                <span class="badge bg-success rounded-pill">${res.calificacionFinal || 0}</span>
                            </a>`;
                    }
                });

                if (!hayFinalizados) {
                    list.innerHTML = '<div class="list-group-item small text-muted text-center">Sin resultados aún.</div>';
                }
            });
        }

        document.getElementById('btnLogout').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = "index.html");
        });
    </script>
</body>

</html>
