<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - ExamSys</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --admin-purple: #4b39b3;
            --dark-bg: #1e1e2d;
        }

        body {
            background-color: #f4f5f7;
        }

        .sidebar {
            background-color: var(--dark-bg);
            min-height: 100vh;
            color: white;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.7);
            transition: 0.3s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        .stats-card {
            border: none;
            border-left: 5px solid var(--admin-purple);
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar p-3">
                <h4 class="text-center fw-bold mb-4">ExamSys Admin</h4>
                <ul class="nav flex-column gap-2">
                    <li class="nav-item"><a class="nav-link active" href="#"><i class="bi bi-speedometer2 me-2"></i>
                            Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="gestion_usuarios.html"><i class="bi bi-people me-2"></i> Gestión de
                            Usuarios</a></li>
                    <li class="nav-item"><a class="nav-link" href="reportes_analitica.html"><i
                                class="bi bi-bar-chart-line me-2"></i> Reportes Globales</a></li>
                    <li class="nav-item">
                        <hr class="text-white-50">
                    </li>
                    <li class="nav-item"><button id="btnLogout" class="btn btn-outline-danger w-100 btn-sm">Cerrar
                            Sesión</button></li>
                </ul>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-4 py-4">
                <div
                    class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Panel de Control General</h1>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-4">
                        <div class="card stats-card shadow-sm p-3">
                            <div class="text-muted small fw-bold text-uppercase">Total Usuarios</div>
                            <h3 id="totalUsers" class="fw-bold">--</h3>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card stats-card shadow-sm p-3 border-primary">
                            <div class="text-muted small fw-bold text-uppercase">Exámenes Realizados</div>
                            <h3 id="totalExams" class="fw-bold">--</h3>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card stats-card shadow-sm p-3 border-success">
                            <div class="text-muted small fw-bold text-uppercase">Promedio Global</div>
                            <h3 id="avgScore" class="fw-bold">--</h3>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0">Usuarios Registrados</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Nombre</th>
                                        <th>Correo</th>
                                        <th>Rol</th>
                                        <th>Fecha Registro</th>
                                    </tr>
                                </thead>
                                <tbody id="userTableBody">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtg1t8wDvbGJggV4M6hWsBsg__kaoIAYE",
            authDomain: "databaseex-238c7.firebaseapp.com",
            projectId: "databaseex-238c7",
            storageBucket: "databaseex-238c7.firebasestorage.app",
            messagingSenderId: "1013480049532",
            appId: "1:1013480049532:web:066afa29f8727c7ea332f9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Seguridad: Verificar Rol de Admin (RF01)
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "index.html";
            } else {
                const userSnap = await getDoc(doc(db, "users", user.uid));
                if (userSnap.exists() && userSnap.data().rol !== "Administrador") {
                    alert("Acceso denegado. Se requieren permisos de Administrador.");
                    window.location.href = "index.html";
                }
            }
        });

        // Cargar Usuarios en Tiempo Real (RF01)
        onSnapshot(collection(db, "users"), (snapshot) => {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';
            document.getElementById('totalUsers').innerText = snapshot.size;

            snapshot.forEach((doc) => {
                const data = doc.data();
                tbody.innerHTML += `
                <tr>
                    <td>${data.nombre}</td>
                    <td>${data.correo}</td>
                    <td><span class="badge ${data.rol === 'Administrador' ? 'bg-danger' : 'bg-primary'}">${data.rol}</span></td>
                    <td>${new Date(data.fechaRegistro).toLocaleDateString()}</td>
                    
                </tr>
            `;
            });
        });

        document.getElementById('btnLogout').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = "index.html");
        });
    </script>
</body>

</html>
