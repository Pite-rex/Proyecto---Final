<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Docente - ExamSys</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --primary-dark: #2c3e50; --accent: #3498db; }
        body { background-color: #f8f9fa; }
        .navbar { background-color: var(--primary-dark); }
        .card-menu { border: none; transition: 0.3s; cursor: pointer; }
        .card-menu:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .status-online { color: #2ecc71; font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark shadow-sm p-3">
    <div class="container d-flex justify-content-between">
        <span class="navbar-brand fw-bold"><i class="bi bi-person-workspace me-2"></i>Panel del Docente</span>
        <button id="btnLogout" class="btn btn-outline-light btn-sm">Cerrar Sesión</button>
    </div>
</nav>

<div class="container py-5">
    <div class="row mb-5">
        <div class="col-12">
            <h2 class="fw-bold">Bienvenido, Profesor</h2>
            <p class="text-muted">Gestione sus evaluaciones y analice el progreso de sus alumnos.</p>
        </div>
    </div>

    <div class="row g-4 mb-5 text-center">
        <div class="col-md-3">
            <a href="crear_examen.html" class="text-decoration-none text-dark">
                <div class="card card-menu p-4 shadow-sm">
                    <i class="bi bi-file-earmark-plus fs-1 text-primary mb-2"></i>
                    <h6>Crear Examen</h6>
                </div>
            </a>
        </div>
        <div class="col-md-3">
            <a href="banco_preguntas.html" class="text-decoration-none text-dark">
                <div class="card card-menu p-4 shadow-sm">
                    <i class="bi bi-database-fill fs-1 text-success mb-2"></i>
                    <h6>Banco de Preguntas</h6>
                </div>
            </a>
        </div>
        <div class="col-md-3">
            <a href="calificar_ensayos.html" class="text-decoration-none text-dark">
                <div class="card card-menu p-4 shadow-sm">
                    <i class="bi bi-pencil-square fs-1 text-warning mb-2"></i>
                    <h6 id="calificarEnsayosTitulo">Calificar Ensayos</h6>
                </div>
            </a>
        </div>
        <div class="col-md-3">
            <a href="reportes_analitica.html" class="text-decoration-none text-dark">
                <div class="card card-menu p-4 shadow-sm">
                    <i class="bi bi-graph-up-arrow fs-1 text-info mb-2"></i>
                    <h6>Analítica</h6>
                </div>
            </a>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3 d-flex justify-content-between">
            <h5 class="mb-0 fw-bold">Estado de Exámenes (Tiempo Real)</h5>
            <span class="status-online" id="firestoreStatus"><i class="bi bi-circle-fill me-1"></i> Conectado a Firestore</span>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Examen</th>
                            <th>Fecha Límite</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="listaExamenes">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc as docRef, deleteDoc, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCtg1t8wDvbGJggV4M6hWsBsg__kaoIAYE",
        authDomain: "databaseex-238c7.firebaseapp.com",
        projectId: "databaseex-238c7",
        storageBucket: "databaseex-238c7.firebasestorage.app",
        messagingSenderId: "1013480049532",
        appId: "1:1013480049532:web:066afa29f8727c7ea332f9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Seguridad: Verificar que el usuario esté logueado
    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "index.html";
    });

    // Helpers
    function escapeHtml(unsafe) {
        if (unsafe === undefined || unsafe === null) return '';
        return String(unsafe)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function formatDate(value) {
        if (!value) return 'Sin fecha';
        try {
            if (typeof value === 'object' && typeof value.toDate === 'function') {
                return value.toDate().toLocaleDateString();
            }
            const d = new Date(value);
            if (isNaN(d)) return 'Sin fecha';
            return d.toLocaleDateString();
        } catch (e) {
            return 'Sin fecha';
        }
    }

    // Cargar Exámenes en tiempo real
    const q = query(collection(db, "exams"), orderBy("fechaCreacion", "desc"));
    const tbody = document.getElementById('listaExamenes');

    onSnapshot(q, (snapshot) => {
        tbody.innerHTML = '';
        snapshot.forEach((docSnap) => {
            const examen = docSnap.data() || {};
            const id = docSnap.id;
            const titulo = escapeHtml(examen.titulo ?? 'Sin título');
            const fecha = formatDate(examen.fechaInicio);
            const estado = examen.estado ?? 'Activo';

            tbody.innerHTML += `
                <tr data-id="${id}">
                    <td>${titulo}</td>
                    <td>${fecha}</td>
                    <td><span class="badge bg-success">${escapeHtml(estado)}</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary btn-view" data-id="${id}" aria-label="Ver examen"><i class="bi bi-eye"></i></button>
                        <button class="btn btn-sm btn-outline-danger btn-delete" data-id="${id}" aria-label="Eliminar examen"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
            `;
        });
    }, (error) => {
        console.error('Error en onSnapshot (exams):', error);
        const status = document.getElementById('firestoreStatus');
        if (status) {
            status.innerHTML = '<i class="bi bi-exclamation-triangle-fill me-1"></i> Desconectado de Firestore';
            status.classList.remove('text-success');
            status.classList.add('text-danger');
        }
    });

    // Delegación de eventos para botones Ver / Eliminar
    tbody.addEventListener('click', async (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;
        const id = btn.dataset.id;
        if (!id) return;

        if (btn.classList.contains('btn-delete')) {
            const confirmDelete = confirm('¿Eliminar este examen? Esta acción no se puede deshacer.');
            if (!confirmDelete) return;
            try {
                await deleteDoc(docRef(db, 'exams', id));
                // onSnapshot actualizará la tabla automáticamente
            } catch (err) {
                console.error('Error borrando examen:', err);
                alert('Error al borrar el examen. Revisa la consola para más detalles.');
            }
        } else if (btn.classList.contains('btn-view')) {
            // Redirigir a la página de detalle (asegúrate de implementar ver_examen.html)
            window.location.href = `ver_examen.html?id=${encodeURIComponent(id)}`;
        }
    });

    // Contador de ensayos pendientes (colección 'essayTasks' con campo 'estado' == 'pendiente')
    try {
        const qEnsayos = query(collection(db, 'essayTasks'), where('estado', '==', 'pendiente'));
        const tituloEnsayos = document.getElementById('calificarEnsayosTitulo');
        onSnapshot(qEnsayos, (snap) => {
            const count = snap.size || 0;
            if (tituloEnsayos) {
                tituloEnsayos.textContent = `Calificar Ensayos (${count})`;
            }
            // También podrías mostrar un mensaje en otra parte si count === 0
        }, (err) => {
            console.error('Error en onSnapshot (essayTasks):', err);
            if (tituloEnsayos) tituloEnsayos.textContent = 'Calificar Ensayos (error)';
        });
    } catch (e) {
        console.error('No se pudo inicializar el listener de ensayos:', e);
    }

    // Cierre de sesión
    document.getElementById('btnLogout').addEventListener('click', () => {
        signOut(auth).then(() => window.location.href = "index.html");
    });
</script>

</body>
</html>
