<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>
    <form id="exam-form">
        <div id="question-container"></div>
        <button type="submit">Submit</button>
    </form>
    <div id="error-message" style="color: red;"></div>

    <script>
        const firebaseConfig = {
            // Your Firebase configuration here
        };
        firebase.initializeApp(firebaseConfig);

        let questionCounter = 0;
        const questions = [...]; // Array of questions

        function updateProgressBar() {
            const progressBar = document.getElementById('progress-bar');
            const progressPercentage = (questionCounter / questions.length) * 100;
            progressBar.style.width = `${progressPercentage}%`;
        }

        function validateAnswers() {
            const answers = [...]; // Collect answers
            for (let answer of answers) {
                if (!answer) {
                    document.getElementById('error-message').innerText = 'Please answer all questions before submission.';
                    return false;
                }
            }
            return true;
        }

        document.getElementById('exam-form').addEventListener('submit', (event) => {
            event.preventDefault();
            if (validateAnswers()) {
                // Submit the exam
            }
        });

        function fetchQuestions() {
            const db = firebase.database();
            db.ref('questions').once('value').then((snapshot) => {
                // Handle questions
                updateProgressBar();
            }).catch((error) => {
                document.getElementById('error-message').innerText = 'Error fetching questions: ' + error.message;
            });
        }

        window.onload = fetchQuestions;
    </script>
</body>
</html>
