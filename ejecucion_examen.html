<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen en Progreso - ExamSys</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            user-select: none;
        }

        #timer-sticky {
            position: sticky;
            top: 10px;
            z-index: 1000;
        }

        .pregunta-card {
            border-radius: 12px;
            border: none;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="container py-4">
        <div id="timer-sticky" class="d-flex justify-content-end mb-3">
            <div class="badge bg-danger p-3 fs-5 shadow-sm">
                <i class="bi bi-clock me-2"></i> Tiempo restante: <span id="time">00:00</span>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h3 id="tituloExamen">Cargando evaluación...</h3>
                        <p class="text-muted small">El progreso se guarda automáticamente cada minuto.</p>
                    </div>
                </div>

                <form id="quizForm">
                    <div id="contenedorPreguntas">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg shadow">Finalizar y Enviar Examen</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCtg1t8wDvbGJggV4M6hWsBsg__kaoIAYE",
        authDomain: "databaseex-238c7.firebaseapp.com",
        projectId: "databaseex-238c7",
        storageBucket: "databaseex-238c7.firebasestorage.app",
        messagingSenderId: "1013480049532",
        appId: "1:1013480049532:web:066afa29f8727c7ea332f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const examID = urlParams.get('id');
    let resultID = "";
    let preguntasDataLocal = {}; // Para comparar respuestas al final
    let materiaExamen = "";

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "login.html";
        } else if (examID) {
            await cargarExamen(user);
        } else {
            alert("Examen no válido.");
            window.location.href = "dashboard_estudiante.html";
        }
    });

    async function cargarExamen(user) {
        try {
            const examSnap = await getDoc(doc(db, "exams", examID));
            if (!examSnap.exists()) return;

            const examData = examSnap.data();
            materiaExamen = examData.materia;
            document.getElementById('tituloExamen').innerText = `${examData.materia}: ${examData.titulo}`;
            startTimer(examData.limiteMinutos * 60);

            // Verificar si ya se completó (Seguridad extra)
            const qVerificar = query(collection(db, "results"), 
                where("ID_estudiante", "==", user.uid),
                where("ID_examen", "==", examID),
                where("estado", "==", "finalizado")
            );
            const checkSnap = await getDocs(qVerificar);
            if (!checkSnap.empty) {
                alert("Ya has realizado esta evaluación.");
                window.location.href = "dashboard_estudiante.html";
                return;
            }

            // Crear registro de inicio
            const resRef = await addDoc(collection(db, "results"), {
                ID_estudiante: user.uid,
                ID_examen: examID,
                materia: examData.materia,
                tituloExamen: examData.titulo,
                estado: "en_progreso",
                fechaInicio: new Date().toISOString()
            });
            resultID = resRef.id;

            const contenedor = document.getElementById('contenedorPreguntas');
            contenedor.innerHTML = '';

            // Cargar preguntas y guardar sus respuestas correctas localmente para calificar
            for (const pID of examData.preguntasIDs) {
                const qSnap = await getDoc(doc(db, "questions", pID));
                if (qSnap.exists()) {
                    const qData = qSnap.data();
                    preguntasDataLocal[pID] = qData; // Guardamos para calificar después
                    renderPregunta(pID, qData, contenedor);
                }
            }
        } catch (e) {
            console.error(e);
        }
    }

    function renderPregunta(id, data, contenedor) {
        const div = document.createElement('div');
        div.className = 'card pregunta-card shadow-sm p-4';
        let html = `<h5 class="mb-3">${data.planteamiento}</h5>`;

        if (data.tipo === 'opcion_multiple') {
            data.opciones.forEach(opt => {
                html += `<div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="${id}" value="${opt}" required>
                    <label class="form-check-label">${opt}</label>
                </div>`;
            });
        } else if (data.tipo === 'verdadero_falso') {
            html += `
                <div class="form-check"><input class="form-check-input" type="radio" name="${id}" value="Verdadero" required><label class="form-check-label">Verdadero</label></div>
                <div class="form-check"><input class="form-check-input" type="radio" name="${id}" value="Falso" required><label class="form-check-label">Falso</label></div>`;
        } else {
            html += `<textarea name="${id}" class="form-control" rows="3" placeholder="Escribe tu respuesta..." required></textarea>`;
        }
        div.innerHTML = html;
        contenedor.appendChild(div);
    }

    function startTimer(duration) {
        let timer = duration;
        const display = document.getElementById('time');
        const interval = setInterval(() => {
            let mins = Math.floor(timer / 60);
            let secs = timer % 60;
            display.textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            if (--timer < 0) {
                clearInterval(interval);
                alert("Tiempo agotado. El examen se enviará automáticamente.");
                enviarExamen();
            }
        }, 1000);
    }

    async function enviarExamen() {
        const form = document.getElementById('quizForm');
        const formData = new FormData(form);
        const respuestasUser = Object.fromEntries(formData.entries());
        
        let aciertos = 0;
        let totalPreguntas = Object.keys(preguntasDataLocal).length;
        let requiereRevisionManual = false;

        // Calificación automática
        for (const pID in preguntasDataLocal) {
            const pregunta = preguntasDataLocal[pID];
            if (pregunta.tipo !== 'ensayo') {
                if (respuestasUser[pID] === pregunta.respuestaCorrecta) {
                    aciertos++;
                }
            } else {
                requiereRevisionManual = true;
            }
        }

        // Calcular nota base 10
        let nota = totalPreguntas > 0 ? ((aciertos / totalPreguntas) * 10).toFixed(1) : 0;

        await updateDoc(doc(db, "results", resultID), {
            respuestas: respuestasUser,
            estado: "finalizado",
            fechaTermino: new Date().toISOString(),
            calificacionFinal: requiereRevisionManual ? null : nota,
            puntos: aciertos,
            totalItems: totalPreguntas,
            requiereRevision: requiereRevisionManual
        });

        alert("Examen finalizado correctamente.");
        window.location.href = `revision_resultados.html?id=${resultID}`;
    }

    document.getElementById('quizForm').addEventListener('submit', (e) => {
        e.preventDefault();
        if (confirm("¿Estás seguro de finalizar la evaluación?")) enviarExamen();
    });
</script>

</body>

</html>
