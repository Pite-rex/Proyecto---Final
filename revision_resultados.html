<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados - ExamSys</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .result-header {
            background: linear-gradient(135deg, #2c3e50, #4ca1af);
            color: white;
            border-radius: 15px;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border: 8px solid #f1c40f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            margin: 0 auto;
        }

        .feedback-box {
            border-left: 5px solid #3498db;
            background-color: #eaf2f8;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="result-header p-5 text-center mb-4 shadow">
                    <h1 class="display-5">Resultado de Evaluación</h1>
                    <p class="lead" id="nombreExamen">Examen Parcial: Programación Web</p>
                    <div class="score-circle mt-3 bg-white text-dark">
                        <span id="calificacion">--</span>
                    </div>
                </div>

                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3"><i class="bi bi-chat-left-dots me-2"></i>Retroalimentación del Docente
                        </h5>
                        <div class="feedback-box p-3 rounded italic" id="retroalimentacionDocente">
                            El docente aún no ha emitido comentarios cualitativos para esta evaluación.
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Desglose de Respuestas</h5>
                    </div>
                    <div class="card-body p-0">
                        <ul class="list-group list-group-flush" id="listaRevision">
                            <li class="list-group-item p-4 text-center text-muted">Cargando revisión...</li>
                        </ul>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <a href="#" id="btnVolver" class="btn btn-primary px-5">Cargando...</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import {
            getFirestore,
            doc,
            getDoc
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        import {
            getAuth,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtg1t8wDvbGJggV4M6hWsBsg__kaoIAYE",
            authDomain: "databaseex-238c7.firebaseapp.com",
            projectId: "databaseex-238c7",
            storageBucket: "databaseex-238c7.firebasestorage.app",
            messagingSenderId: "1013480049532",
            appId: "1:1013480049532:web:066afa29f8727c7ea332f9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // =========================
        // OBTENER ID RESULTADO
        // =========================
        const urlParams = new URLSearchParams(window.location.search);
        const resultID = urlParams.get("id");

        if (!resultID) {
            alert("No se encontró el resultado.");
            window.location.href = "index.html";
        }

        onAuthStateChanged(auth, async (user) => {

            if (!user) {
                alert("Debes iniciar sesión");
                window.location.href = "index.html";
                return;
            }

            // =========================
            // GUARDIA DE SEGURIDAD (URL PEGADA)
            // =========================
            if (document.referrer === "") {
                alert("Acceso denegado. No puedes ingresar copiando y pegando el enlace directamente.");
                window.location.href = "index.html";
                return;
            }

            // =========================
            // LÓGICA DEL BOTÓN VOLVER SEGÚN ROL
            // =========================
            try {
                const userDocSnap = await getDoc(doc(db, "users", user.uid));
                const btnVolver = document.getElementById('btnVolver');

                if (userDocSnap.exists() && userDocSnap.data().rol === "Docente") {
                    if (btnVolver) {
                        btnVolver.href = "reportes_analitica.html";
                        btnVolver.innerText = "Volver a Analítica";
                    }
                } else {
                    if (btnVolver) {
                        btnVolver.href = "dashboard_estudiante.html";
                        btnVolver.innerText = "Volver a Mis Cursos";
                    }
                }
            } catch (err) {
                console.error("Error al verificar rol:", err);
            }

            // =========================
            // SI PASA LOS FILTROS, CARGAMOS LOS DATOS
            // =========================
            console.log("USUARIO AUTENTICADO");
            cargarResultado();

        });

        async function cargarResultado() {

            const lista = document.getElementById("listaRevision");

            try {

                // =========================
                // TRAER RESULTADO
                // =========================
                const resultRef = doc(db, "results", resultID);
                const resultSnap = await getDoc(resultRef);

                if (!resultSnap.exists()) {
                    lista.innerHTML = `
                    <li class="list-group-item text-danger text-center p-4">
                        No existe el resultado.
                    </li>
                `;
                    return;
                }

                const data = resultSnap.data();
                console.log("DATOS RESULTADO:", data);
                console.log("RESULT ID:", resultID);

                // =========================
                // DATOS GENERALES
                // =========================
                document.getElementById("nombreExamen").innerText =
                    `${data.materia || "Materia"} - ${data.tituloExamen || data.titulo || "Examen"}`;

                document.getElementById("calificacion").innerText =
                    data.calificacionFinal ?? "0";

                if (data.comentariosDocente) {
                    document.getElementById("retroalimentacionDocente").innerText =
                        data.comentariosDocente;
                }

                // =========================
                // VALIDAR ID EXAMEN
                // =========================
                if (!data.ID_examen) {

                    lista.innerHTML = `
                    <li class="list-group-item text-danger text-center p-4">
                        El resultado no tiene ID_examen.
                    </li>
                `;

                    return;
                }

                // =========================
                // TRAER EXAMEN
                // =========================
                const examRef = doc(db, "exams", data.ID_examen);
                const examSnap = await getDoc(examRef);

                if (!examSnap.exists()) {

                    lista.innerHTML = `
                    <li class="list-group-item text-danger text-center p-4">
                        No existe el examen relacionado.
                    </li>
                `;

                    return;
                }

                const examData = examSnap.data();
                console.log("EXAMEN:", examData);

                // =========================
                // VALIDAR PREGUNTAS
                // =========================
                if (!examData.preguntasIDs || examData.preguntasIDs.length === 0) {

                    lista.innerHTML = `
                    <li class="list-group-item text-warning text-center p-4">
                        Este examen no tiene preguntas registradas.
                    </li>
                `;

                    return;
                }

                lista.innerHTML = "";

                const respuestasAlumno = data.respuestas || {};

                let contador = 1;

                // =========================
                // RECORRER PREGUNTAS
                // =========================
                for (const preguntaID of examData.preguntasIDs) {

                    try {

                        const preguntaRef = doc(db, "questions", preguntaID);
                        const preguntaSnap = await getDoc(preguntaRef);

                        if (!preguntaSnap.exists()) {
                            continue;
                        }

                        const pregunta = preguntaSnap.data();

                        const respuestaAlumno =
                            respuestasAlumno[preguntaID] || "Sin respuesta";

                        const respuestaCorrecta =
                            pregunta.respuestaCorrecta || "No definida";

                        let estadoHTML = `
    <span class="badge bg-danger">
        Incorrecta
    </span>
`;

                        // =========================
                        // PREGUNTAS ENSAYO
                        // =========================
                        if (pregunta.tipo === "ensayo") {

                            // SI YA EXISTE CALIFICACIÓN FINAL
                            if (
                                data.calificacionFinal !== null &&
                                data.calificacionFinal !== undefined
                            ) {

                                estadoHTML = `
            <span class="badge bg-success">
                Revisada
            </span>
        `;

                            } else {

                                estadoHTML = `
            <span class="badge bg-warning text-dark">
                Pendiente revisión
            </span>
        `;
                            }
                        }

                        // =========================
                        // PREGUNTAS NORMALES
                        // =========================
                        else if (respuestaAlumno === respuestaCorrecta) {

                            estadoHTML = `
        <span class="badge bg-success">
            Correcta
        </span>
    `;
                        }

                        lista.innerHTML += `
                        <li class="list-group-item p-4">

                            <div class="d-flex justify-content-between align-items-center mb-3">

                                <h6 class="fw-bold mb-0">
                                    Pregunta ${contador}
                                </h6>

                                ${estadoHTML}

                            </div>

                            <p class="mb-3">
                                ${pregunta.planteamiento}
                            </p>

                            <div class="mb-2">
                                <label class="fw-bold">
                                    Tu respuesta:
                                </label>

                                <textarea
                                    class="form-control"
                                    readonly
                                >${respuestaAlumno}</textarea>
                            </div>

                            ${pregunta.tipo !== 'ensayo' && respuestaAlumno !== respuestaCorrecta ? `
                            <div class="mt-3">
                                <label class="fw-bold text-success">
                                    Respuesta correcta:
                                </label>

                                <textarea
                                    class="form-control"
                                    readonly
                                >${respuestaCorrecta}</textarea>
                            </div>` : ''}

                        </li>
                    `;

                        contador++;

                    } catch (errorPregunta) {
                        console.error("ERROR PREGUNTA:", errorPregunta);
                    }

                }

                // =========================
                // SI NO HUBO PREGUNTAS
                // =========================
                if (contador === 1) {

                    lista.innerHTML = `
                    <li class="list-group-item text-center p-4">
                        No se pudieron cargar preguntas.
                    </li>
                `;
                }

            } catch (error) {

                console.error(error);

                lista.innerHTML = `
                <li class="list-group-item text-danger text-center p-4">
                    Error al cargar revisión.
                </li>
            `;
            }
        }
    </script>
</body>

</html>
