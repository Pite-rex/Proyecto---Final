<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados - ExamSys</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .result-header {
            background: linear-gradient(135deg, #2c3e50, #4ca1af);
            color: white;
            border-radius: 15px;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border: 8px solid #f1c40f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            margin: 0 auto;
        }

        .feedback-box {
            border-left: 5px solid #3498db;
            background-color: #eaf2f8;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="result-header p-5 text-center mb-4 shadow">
                    <h1 class="display-5">Resultado de Evaluación</h1>
                    <p class="lead" id="nombreExamen">Examen Parcial: Programación Web</p>
                    <div class="score-circle mt-3 bg-white text-dark">
                        <span id="calificacion">--</span>
                    </div>
                </div>

                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3"><i class="bi bi-chat-left-dots me-2"></i>Retroalimentación del Docente
                        </h5>
                        <div class="feedback-box p-3 rounded italic" id="retroalimentacionDocente">
                            El docente aún no ha emitido comentarios cualitativos para esta evaluación.
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Desglose de Respuestas</h5>
                    </div>
                    <div class="card-body p-0">
                        <ul class="list-group list-group-flush" id="listaRevision">
                            <li class="list-group-item p-4 text-center text-muted">Cargando revisión...</li>
                        </ul>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <a href="dashboard_estudiante.html" class="btn btn-primary px-5">Volver a mis cursos</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtg1t8wDvbGJggV4M6hWsBsg__kaoIAYE",
            authDomain: "databaseex-238c7.firebaseapp.com",
            projectId: "databaseex-238c7",
            storageBucket: "databaseex-238c7.firebasestorage.app",
            messagingSenderId: "1013480049532",
            appId: "1:1013480049532:web:066afa29f8727c7ea332f9"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const resultID = "ID_DINAMICO_DEL_RESULTADO"; // Este ID vendría de la URL o del estado anterior

        // Cargar información del resultado en tiempo real
        onSnapshot(doc(db, "results", resultID), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();

                // Actualizar interfaz
                document.getElementById('calificacion').innerText = data.calificacionFinal || "S/N";

                if (data.comentariosDocente) {
                    document.getElementById('retroalimentacionDocente').innerText = data.comentariosDocente;
                }

                // Simulación de carga de respuestas revisadas
                const lista = document.getElementById('listaRevision');
                lista.innerHTML = "";

                // Aquí mapearías las respuestas del estudiante comparadas con la colección 'questions'
                // Ejemplo visual:
                lista.innerHTML += `
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <p class="mb-0 fw-bold">1. ¿Qué etiqueta define el cuerpo del documento en HTML?</p>
                        <small class="text-success">Tu respuesta: &lt;body&gt; (Correcto)</small>
                    </div>
                    <i class="bi bi-check-circle-fill text-success fs-4"></i>
                </li>
            `;
            }
        });
    </script>

</body>

</html>
