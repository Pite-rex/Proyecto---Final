<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios - ExamSys</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .img-profile-sm {
            width: 45px;
            height: 45px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #dee2e6;
            cursor: pointer;
            transition: 0.2s;
        }
        .img-profile-sm:hover { transform: scale(1.1); }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-people-fill me-2"></i>Control de Usuarios</h2>
            <div class="btn-group">
                <a href="dashboard_admin.html" class="btn btn-outline-secondary">Volver al Dashboard</a>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Foto</th>
                            <th>Nombre</th>
                            <th>Correo</th>
                            <th>Rol</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="listaGestion">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Editar Perfil de Usuario</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editUid">
                    <div class="text-center mb-3">
                        <img id="editPreview" src="" class="img-profile-sm" style="width: 100px; height: 100px;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" id="editNombre" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Rol en el Sistema</label>
                        <select id="editRol" class="form-select">
                            <option value="Estudiante">Estudiante</option>
                            <option value="Docente">Docente</option>
                            <option value="Administrador">Administrador</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="actualizarUsuario()">Actualizar Datos</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtg1t8wDvbGJggV4M6hWsBsg__kaoIAYE",
            authDomain: "databaseex-238c7.firebaseapp.com",
            projectId: "databaseex-238c7",
            storageBucket: "databaseex-238c7.firebasestorage.app",
            messagingSenderId: "1013480049532",
            appId: "1:1013480049532:web:066afa29f8727c7ea332f9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Cargar usuarios con foto (Módulo 1)
        onSnapshot(collection(db, "users"), (snapshot) => {
            const tbody = document.getElementById('listaGestion');
            tbody.innerHTML = '';
            
            snapshot.forEach((userDoc) => {
                const u = userDoc.data();
                // Si no tiene foto (como el Admin), ponemos una imagen por defecto
                const fotoURL = u.fotoPerfil ? u.fotoPerfil : 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                
                tbody.innerHTML += `
                    <tr>
                        <td><img src="${fotoURL}" class="img-profile-sm" alt="Perfil"></td>
                        <td class="fw-bold">${u.nombre}</td>
                        <td>${u.correo}</td>
                        <td><span class="badge ${u.rol === 'Administrador' ? 'bg-danger' : 'bg-primary'}">${u.rol}</span></td>
                        <td>
                            <div class="btn-group">
                                <button class="btn btn-sm btn-outline-warning" onclick="abrirModal('${userDoc.id}', '${u.nombre}', '${u.rol}', '${fotoURL}')">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-info" onclick="restablecerPass('${u.correo}')" title="Reset Contraseña">
                                    <i class="bi bi-key"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger" onclick="eliminarUsuario('${userDoc.id}')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        });

        window.abrirModal = (id, nombre, rol, foto) => {
            document.getElementById('editUid').value = id;
            document.getElementById('editNombre').value = nombre;
            document.getElementById('editRol').value = rol;
            document.getElementById('editPreview').src = foto;
            new bootstrap.Modal(document.getElementById('editModal')).show();
        };

        window.actualizarUsuario = async () => {
            const id = document.getElementById('editUid').value;
            try {
                await updateDoc(doc(db, "users", id), {
                    nombre: document.getElementById('editNombre').value,
                    rol: document.getElementById('editRol').value
                });
                bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                alert("Usuario actualizado correctamente");
            } catch (e) { alert("Error: " + e.message); }
        };

        window.restablecerPass = async (email) => {
            if(confirm(`¿Enviar enlace de recuperación a: ${email}?`)) {
                await sendPasswordResetEmail(auth, email);
                alert("Correo enviado.");
            }
        };

        window.eliminarUsuario = async (id) => {
            if(confirm("¿Eliminar definitivamente a este usuario?")) {
                await deleteDoc(doc(db, "users", id));
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
